name: Release Builds

on:
  push:
    tags:
      - "v*"
      - "Latest"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build package
        shell: bash
        run: bash ./scripts/build-windows-zip.sh --platform anycpu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-anycpu
          path: dist/NSMBe5-windows-anycpu.zip

  build-linux:
    name: Build Linux AppImages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete imagemagick libfuse2

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Build AppImages
        shell: bash
        run: |
          bash ./scripts/build-linux-appimage.sh
          bash ./scripts/build-linux-appimage.sh --bundle-mono

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimages
          path: |
            dist/NSMBe5-linux-x86_64.AppImage
            dist/NSMBe5-linux-x86_64-bundled-mono.AppImage

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/windows-anycpu/NSMBe5-windows-anycpu.zip
            dist/linux-appimages/NSMBe5-linux-x86_64.AppImage
            dist/linux-appimages/NSMBe5-linux-x86_64-bundled-mono.AppImage
